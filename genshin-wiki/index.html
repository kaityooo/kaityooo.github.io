<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原神 キャラクター Wiki</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="site-wrapper">

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <span class="logo-main">原神 Wiki</span>
        <span class="logo-sub">キャラクター図鑑</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">キャラクター</a>
        <a href="#" class="nav-link">武器(実装予定)</a>
        <a href="#" class="nav-link">聖遺物(実装予定)</a>
        <a href="tools-fysmrqjp/create-character.html" class="nav-link">ログイン</a>
      </nav>
    </div>
  </header>

  <!-- メイン -->
  <main class="site-main">

    <!-- ページ見出し -->
    <div class="page-heading">
      <h1 class="page-heading__title">キャラクター一覧</h1>
      <p class="page-heading__sub">キャラクターをクリックして詳細を確認できます</p>
    </div>

    <!-- フィルターバー（JS で動的生成） -->
    <div class="filter-bar" id="filterBar">
      <span class="filter-bar__label">FILTER</span>
    </div>

    <!-- キャラクターグリッド（JS で動的生成） -->
    <div class="character-grid" id="characterGrid">
      <div class="loading-state" id="loadingState" style="grid-column:1/-1">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <p>はらかみwiki — 上方修正キャラクター図鑑</p>
  </footer>

</div>

<script src="js/index.js"></script>
</body>
</html>
