<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin_UI_Moc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/png">
<style>
        @font-face {
    font-family: 'GenshinMainFont';
    src: url('GenshinFont.otf') format('truetype'); 
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}
        :root {
            --bg-gradient: linear-gradient(to bottom, #badfff 0%, #ffffff 100%);
            --bg-particle-color: rgba(255,255,255,0.8);
            --bg-particle-sub: rgba(200, 235, 255, 0.5);
            --container-glow: radial-gradient(circle at center, rgba(255, 255, 255, 0.6) 0%, transparent 80%);
            --glass-bg: rgba(248, 248, 248, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-highlight: rgba(255, 255, 255, 1.0);
            --glass-shadow: 0 20px 50px rgba(100, 150, 200, 0.15);
            --text-main: #0a2a4a;
            --text-dim: #5a7a9a;
            --title-shadow: 2px 2px 4px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            --accent-color: #00aaff;
            --accent-sub: #80d4ff;
            --accent-glow: rgba(0, 170, 255, 0.3);
            --panel-width: 480px;
            --font-custom: 'MyCustomFont', 'Noto Sans JP', sans-serif;
            --border-radius-soft: 30px;
            --border-radius-capsule: 50px;
            --font-custom: 'GenshinMainFont', 'Noto Sans JP', sans-serif;
        }

      
        body.dark-theme {
            --bg-gradient: radial-gradient(circle at 50% 120%, #1a2c55 0%, #0d1221 50%, #000000 100%);
            --bg-particle-color: rgba(255,255,255,0.2);
            --bg-particle-sub: rgba(255,255,255,0.1);
            --container-glow: radial-gradient(circle at center, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            --glass-bg: rgba(20, 30, 50, 0.6);
            --glass-border: rgba(100, 200, 255, 0.2);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            --text-main: #ffffff;
            --text-dim: #8aaecb;
            --title-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            --accent-color: #00f2ff;
            --accent-sub: #4d8eff;
            --accent-glow: rgba(0, 242, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: var(--font-custom);
            color: var(--text-main);
            background: var(--bg-gradient);
            position: relative;
            transition: color 0.5s, background 0.5s;
            -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
        }
        
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle, var(--bg-particle-color) 2px, transparent 4px),
                radial-gradient(circle, var(--bg-particle-sub) 1px, transparent 3px);
            background-size: 500px 500px, 300px 300px;
            opacity: 0.7; z-index: -1;
            animation: bgMove 60s linear infinite;
            transition: opacity 0.5s;
        }
        @keyframes bgMove { 0% { transform: translate(0, 0); } 100% { transform: translate(-50px, -50px); } }

        .container {
            display: flex; width: 100%; height: 100%; padding: 40px 60px; gap: 40px;
            background: var(--container-glow);
            transition: background 0.5s;
        }

        #theme-toggle-btn {
            position: fixed; top: 25px; right: 25px; z-index: 1000;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: var(--border-radius-capsule);
            cursor: pointer;
            font-family: var(--font-custom); font-weight: bold;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        #theme-toggle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
            border-color: var(--accent-color);
        }

        .sidebar {
            width: 280px; display: flex; flex-direction: column; gap: 18px;
            z-index: 10; justify-content: center; height: 100%; flex-shrink: 0;
        }
        .menu-item {
            display: flex; align-items: center; font-size: 1.2rem; color: var(--text-dim);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            padding: 15px 25px; position: relative; overflow: hidden;
            border-radius: var(--border-radius-soft);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
        }
        .menu-item:hover { 
            color: var(--text-main); background: var(--glass-bg);
            border-color: var(--accent-sub); transform: translateX(5px);
        }
        .menu-item.active {
            color: var(--text-main); font-weight: bold; font-size: 1.3rem;
            background: var(--glass-bg);
            box-shadow: 0 10px 20px var(--accent-glow);
            border-color: var(--accent-color);
        }
        .icon-diamond {
            width: 12px; height: 12px; background: var(--accent-sub);
            margin-right: 15px; opacity: 0.6; transition: 0.3s; border-radius: 50%;
        }
        .menu-item.active .icon-diamond { 
            background: var(--accent-color); opacity: 1; transform: scale(1.3); 
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .main-content {
            flex-grow: 1; display: flex; width: 100%; height: 100%;
            animation: fadeIn 0.8s ease-out;
        }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .visual-area {
            flex-grow: 1; height: 100%; display: flex; justify-content: center; align-items: center; position: relative;
        }
        .visual-img {
            max-height: 98%; max-width: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
            animation: floatChar 6s ease-in-out infinite;
            transition: filter 0.5s;
        }
        @keyframes floatChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        
        @keyframes spinBg { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .info-panel {
            width: var(--panel-width); flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center; gap: 25px;
        }
        
        .char-name { 
            font-size: 3.5rem; font-weight: 400; letter-spacing: 0.1em; line-height: 1;
            color: var(--text-main); text-shadow: var(--title-shadow);
            margin-bottom: 10px; transition: color 0.5s, text-shadow 0.5s;
        }
        .rarity { color: #ffcc00; font-size: 1.8rem; letter-spacing: 6px; text-shadow: 0 0 10px rgba(255, 200, 0, 0.5); }
        .section-title { font-size: 2.8rem; letter-spacing: 0.05em; color: var(--text-main); text-shadow: var(--title-shadow); }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius-soft);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            padding: 28px;
            box-shadow: var(--glass-shadow);
            position: relative; overflow: hidden;
            transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
        }
        .glass-box::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .level-info { padding: 20px 30px; gap: 10px; }
        .level-text { font-size: 1.15rem; color: var(--text-dim); letter-spacing: 0.05em; }
        .level-val { font-size: 1.6rem; color: var(--accent-color); font-weight: bold; text-shadow: 0 0 10px var(--accent-glow); }
        .level-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 5px; border: 1px solid var(--glass-border); }
        .level-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-sub), var(--accent-color)); box-shadow: 0 0 15px var(--accent-glow); border-radius: 5px; }
        
        .stats-list { padding: 15px 30px; max-height: 45vh; }
        .stats-list::-webkit-scrollbar { width: 6px; }
        .stats-list::-webkit-scrollbar-thumb { background: var(--accent-sub); border-radius: 10px; }
        
        .stat-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 0; border-bottom: 1px solid rgba(128,128,128,0.1); 
            font-size: 1.15rem; transition: 0.2s;
        }
        .stat-row:hover { background: rgba(255,255,255,0.1); padding-left: 10px; padding-right: 10px; border-radius: 15px;}
        .stat-row:last-child { border-bottom: none; }
        .stat-label { display: flex; align-items: center; color: var(--text-dim); }
        .stat-icon { width: 10px; height: 10px; margin-right: 15px; background: var(--accent-sub); border-radius: 50%; box-shadow: 0 0 5px var(--accent-glow); }
        .stat-value { font-size: 1.2rem; letter-spacing: 0.05em; font-weight: bold; }

        
        .btn-detail:hover { 
            background: var(--accent-color); color: #fff;
            box-shadow: 0 15px 30px var(--accent-glow); 
            transform: translateY(-3px);
        }

.scroll-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-top: 10px;
    overflow-y: auto;
    overflow-x: hidden; 
    max-height: 60vh;
    padding: 15px;
    margin: -15px; 
    width: calc(100% + 10px); 
}

.scroll-list::-webkit-scrollbar {
    width: 4px;
}
.scroll-list::-webkit-scrollbar-thumb {
    background: var(--accent-sub);
    border-radius: 10px;
}
        
        .list-item {
            padding: 18px 25px; display: flex; align-items: center;
            transition: 0.3s; cursor: pointer; 
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            border-radius: var(--border-radius-capsule);
        }
        .list-item:hover { 
            border-color: var(--accent-color); 
            background: rgba(255,255,255,0.1);
            transform: scale(1.02) translateY(-3px); z-index: 5; 
            box-shadow: 0 10px 25px var(--accent-glow);
        }
        
        .item-icon {
            width: 54px; height: 54px; border-radius: 50%;
            background: var(--glass-bg); border: 2px solid var(--accent-sub);
            display: flex; justify-content: center; align-items: center; margin-right: 25px; flex-shrink: 0;
            font-size: 1.4rem; color: var(--accent-sub);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .list-item.unlocked .item-icon {
            background: var(--accent-color); color: #ffffff; border-color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        body.dark-theme .list-item.unlocked .item-icon { color: #000; }

        .item-name { font-size: 1.2rem; margin-bottom: 3px; font-weight: bold; }
        
        .talent-lvl { color: var(--accent-color); font-weight: bold; text-shadow: 0 0 8px var(--accent-glow); }

        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .profile-item { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px 25px; border: 1px solid var(--glass-border); }
        .p-label { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
        .p-val { font-size: 1.2rem; color: var(--text-main); font-weight: bold; }
        .story-box { background: rgba(255,255,255,0.05); padding: 2px; line-height: 2; font-size: 1.05rem; color: var(--text-main); }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .container { flex-direction: column; padding: 20px; gap: 30px; }
            #theme-toggle-btn { top: 15px; right: 15px; padding: 8px 15px; font-size: 0.9rem;}
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding-bottom: 15px; justify-content: flex-start; gap: 10px;}
            .menu-item { font-size: 0.95rem; padding: 10px 20px; white-space: nowrap; border-radius: 25px;}
            .main-content { flex-direction: column; }
            .visual-area { height: 45vh; margin-bottom: 30px; margin-top: 40px;}
            .info-panel { width: 100%; gap: 20px;}
            .char-name { font-size: 3rem; }
        }

       
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.4s;
        }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            width: 900px; max-width: 95%; padding: 50px; 
            background: var(--glass-bg); border-radius: 40px; box-shadow: var(--glass-shadow);
            transform: scale(0.95) translateY(20px); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; max-height: 90vh;
        }
        #modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

        @media (max-width: 768px) {
            .modal-box { padding: 30px; width: 95%; max-height: 85vh; border-radius: 30px;}
        }

        .modal-close { position: absolute; top: 30px; right: 35px; font-size: 2.5rem; color: var(--text-dim); cursor: pointer; transition: 0.3s;}
        .modal-close:hover { color: var(--accent-color); transform: rotate(90deg); }
        
        .modal-title { font-size: 2.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; margin-bottom: 30px; color: var(--text-main); letter-spacing: 0.05em; font-weight: bold;}
        
        .modal-tabs { display: flex; margin-bottom: 30px; gap: 30px; }
        .m-tab { padding: 10px 0; cursor: pointer; color: var(--text-dim); font-size: 1.3rem; position: relative; transition: 0.3s; font-weight: bold;}
        .m-tab:hover { color: var(--accent-color) }
        .m-tab.active { color: #000000; }
        .m-tab.active::after { content: ""; position: absolute; bottom: -5px; left: 0; width: 100%; height: 4px; background: var(--accent-color); border-radius: 4px; box-shadow: 0 0 15px var(--accent-glow); }
        
        .modal-content-area { overflow-y: auto; flex-grow: 1; padding-right: 15px; }
        .modal-content-area::-webkit-scrollbar { width: 8px; }
        .modal-content-area::-webkit-scrollbar-thumb { background: var(--accent-sub); border-radius: 10px; }

        .modal-desc { font-size: 1.25rem; line-height: 1.9; color: var(--text-main); white-space: pre-wrap; }

        .scale-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .scale-row { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px;}
        .scale-cell { padding: 15px 20px; color: #000000; font-size: 1.1rem;}
        .scale-val { text-align: right; color: #000000; font-weight: bold; }

        .slider-container { display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 20px 30px; border-radius: 50px; margin-bottom: 30px; border: 1px solid var(--glass-border); }
        .slider-label { color: #000000; font-size: 1.4rem; min-width: 90px; font-weight: bold; text-shadow: 0 0 10px #ffffff;}
        .range-input { flex-grow: 1; margin: 0 25px; height: 8px; background: rgba(128,128,128,0.2); border-radius: 4px; }
        .range-input::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: var(--accent-color); box-shadow: 0 0 15px var(--accent-glow); border-radius: 50%; cursor: pointer; border: 2px solid #fff;}
 


@keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}


@keyframes float {
    0%, 100% { 
        transform: translateY(0); 
    }
    50% { 
        
        transform: translateY(-8px); 
    }
}

.main-content:not(.hidden) {
    display: flex;
    animation: slideInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}


.visual-img {
    animation: float 5s ease-in-out infinite;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    transition: transform 0.3s ease-out; 
}


.visual-area:hover .visual-img {
    transform: scale(1.03);
}


.list-item {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.list-item:active {
    transform: scale(0.95);
}


#modal-overlay {
    backdrop-filter: blur(0px);
    transition: all 0.4s ease;
}
#modal-overlay.active {
    backdrop-filter: blur(20px);
} 
    </style>
</head>
<body>
    <script src="data.js"></script>

    
    <div class="container">
        <nav class="sidebar">
            <div class="menu-item active" onclick="switchTab('status')" id="tab-status">
                <div class="icon-diamond"></div><span id="nav-status"></span>
            </div>
            <div class="menu-item" onclick="switchTab('weapon')" id="tab-weapon">
                <div class="icon-diamond"></div><span id="nav-weapon"></span>
            </div>
            <div class="menu-item" onclick="switchTab('constellation')" id="tab-constellation">
                <div class="icon-diamond"></div><span id="nav-constellation"></span>
            </div>
            <div class="menu-item" onclick="switchTab('talents')" id="tab-talents">
                <div class="icon-diamond"></div><span id="nav-talents"></span>
            </div>
            <div class="menu-item" onclick="switchTab('profile')" id="tab-profile">
                <div class="icon-diamond"></div><span id="nav-profile"></span>
            </div>
        </nav>

        <div id="view-status" class="main-content">
            <div class="visual-area">
                <img id="status-img" class="visual-img">
            </div>
            <div class="info-panel">
                <div>
                    <div class="char-name" id="profile-name"></div>
                    <div class="rarity" id="profile-rarity"></div>
                </div>
                <div class="glass-box level-info">
                    <div class="level-text"><span id="label-level-char"></span> <span class="level-val" id="profile-lvl"></span> / <span id="profile-max"></span></div>
                    <div class="level-bar-bg"><div class="level-bar-fill" style="width: 100%;"></div></div>
                </div>
                <div class="stats-list" id="stats-list-container"></div>
                <div class="btn-detail" id="btn-detail"></div>
            </div>
        </div>

        <div id="view-weapon" class="main-content hidden">
            <div class="visual-area">
                <img id="weapon-img" class="visual-img">
            </div>
            <div class="info-panel">
                <div>
                    <div class="section-title" id="weapon-name"></div>
                    <div class="rarity" id="weapon-rarity"></div>
                    <div style="color:var(--text-dim); margin-top:5px;" id="weapon-subname"></div>
                    <div style="color:var(--text-dim);" id="weapon-type"></div>
                </div>
                <div class="glass-box level-info">
                    <div class="level-text"><span id="label-level-weapon"></span> <span class="level-val" id="weapon-lvl"></span> / <span id="weapon-max"></span></div>
                    <div class="level-bar-bg"><div class="level-bar-fill" style="width: 100%;"></div></div>
                </div>
                <div class="stats-list" id="weapon-stats-list"></div>
                <div class="description-area" style="border-left: 5px solid var(--accent-color);">
                    <span style="color: var(--accent-color); font-weight: bold; display: block; margin-bottom: 5px;" id="weapon-effect-title"></span>
                    <p id="weapon-effect-desc"></p>
                </div>
            </div>
        </div>

        <div id="view-constellation" class="main-content hidden">
            <div class="visual-area">
                <img id="const-img" class="visual-img">
            </div>
            <div class="info-panel">
                <div>
                    <div class="section-title" id="constellation-name"></div>
                    <div style="color:var(--text-dim);" id="sub-constellation"></div>
                </div>
                <div class="scroll-list" id="constellation-list-container"></div>
            </div>
        </div>

        <div id="view-talents" class="main-content hidden">
            <div class="visual-area">
                <img id="talent-img" class="visual-img">
            </div>
            <div class="info-panel">
                <div>
                    <div class="section-title" id="title-talents"></div>
                    <div style="color:var(--text-dim);" id="sub-talents"></div>
                </div>
                <div class="scroll-list" id="talent-list-container"></div>
            </div>
        </div>

        <div id="view-profile" class="main-content hidden">
            <div class="visual-area">
                <img id="profile-img-tab" class="visual-img">
            </div>
            <div class="info-panel">
                <div>
                    <div class="section-title" id="title-profile"></div>
                    <div style="color:var(--text-dim);" id="sub-profile"></div>
                </div>
                <div class="glass-box">
                    <div class="profile-grid">
                        <div class="profile-item"><div class="p-label" id="label-birthday"></div><div class="p-val" id="p-bday"></div></div>
                        <div class="profile-item"><div class="p-label" id="label-affiliation"></div><div class="p-val" id="p-aff"></div></div>
                        <div class="profile-item"><div class="p-label" id="label-vision"></div><div class="p-val" id="p-vision"></div></div>
                        <div class="profile-item"><div class="p-label" id="label-constellation"></div><div class="p-val" id="p-const"></div></div>
                    </div>
                    <div class="profile-item" style="margin-bottom: 20px;"><div class="p-label" id="label-cv"></div><div class="p-val" id="p-cv"></div></div>
                    <div style="color:var(--text-dim); margin-bottom:10px; font-size:0.9rem;" id="label-story"></div>
                    <div class="story-box" id="p-story"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-close" onclick="forceCloseModal()">×</div>
            <div class="modal-title" id="m-title"></div>
            <div class="modal-tabs hidden" id="m-tabs">
                <div class="m-tab active" onclick="switchModalTab('desc')" id="tab-desc"></div>
                <div class="m-tab" onclick="switchModalTab('scale')" id="tab-scale"></div>
            </div>
            <div class="modal-content-area" id="area-desc"><div class="modal-desc" id="m-desc"></div></div>
            <div class="modal-content-area hidden" id="area-scale">
                <div class="slider-container">
                    <div class="slider-label"><span id="label-slider"></span> <span id="slider-val-text">10</span></div>
                    <input type="range" min="1" max="13" value="10" class="range-input" id="lvl-slider" oninput="onSliderChange(this.value)">
                </div>
                <table class="scale-table" id="scale-table"></table>
            </div>
        </div>
    </div>

    <script>
        const GD = window.genshinData;
        let currentTalentKey = null;

        window.onload = function() {
            renderUI(); 
            renderProfile(); 
            renderProfileDetails(); 
            renderStats(); 
            renderWeapon(); 
            renderConstellations(); 
            renderTalents();
            updateThemeButton();
        };

        
        function renderUI() {
            
            document.getElementById('nav-status').innerText = GD.ui.nav.status;
            document.getElementById('nav-weapon').innerText = GD.ui.nav.weapon;
            document.getElementById('nav-constellation').innerText = GD.ui.nav.constellation;
            document.getElementById('nav-talents').innerText = GD.ui.nav.talents;
            document.getElementById('nav-profile').innerText = GD.ui.nav.profile;

            document.getElementById('label-level-char').innerText = GD.ui.common.level;
            document.getElementById('label-level-weapon').innerText = GD.ui.common.level;
            
            document.getElementById('sub-constellation').innerText = GD.ui.titles.constellationSub;
            document.getElementById('title-talents').innerText = GD.ui.nav.talents; 
            document.getElementById('sub-talents').innerText = GD.ui.titles.talentsSub;
            document.getElementById('title-profile').innerText = GD.ui.nav.profile;
            document.getElementById('sub-profile').innerText = GD.ui.titles.profileSub;
            document.getElementById('label-story').innerText = GD.ui.titles.storyLabel;

            document.getElementById('label-birthday').innerText = GD.ui.profileLabels.birthday;
            document.getElementById('label-affiliation').innerText = GD.ui.profileLabels.affiliation;
            document.getElementById('label-vision').innerText = GD.ui.profileLabels.vision;
            document.getElementById('label-constellation').innerText = GD.ui.profileLabels.constellation;
            document.getElementById('label-cv').innerText = GD.ui.profileLabels.cv;
           
            document.getElementById('tab-desc').innerText = GD.ui.modal.tabDesc;
            document.getElementById('tab-scale').innerText = GD.ui.modal.tabAttrib;
            document.getElementById('label-slider').innerText = GD.ui.modal.sliderLabel;
        }

        function updateThemeButton() {
            const btn = document.getElementById('theme-toggle-btn');
            if(document.body.classList.contains('dark-theme')){
                btn.innerText = GD.ui.buttons.themeDark;
            } else {
                btn.innerText = GD.ui.buttons.themeLight;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            updateThemeButton();
        }

        function renderProfile() {
            const p = GD.profile;
            document.getElementById('profile-name').innerText = p.name;
            document.getElementById('profile-rarity').innerText = "★".repeat(p.rarity);
            document.getElementById('profile-lvl').innerText = p.levelCurrent;
            document.getElementById('profile-max').innerText = p.levelMax;
            const imgs = ['status-img', 'const-img', 'talent-img', 'profile-img-tab'];
            imgs.forEach(id => { const el = document.getElementById(id); if(el) el.src = p.imageSrc; });
        }

        function renderProfileDetails() {
            const i = GD.profileInfo;
            if(!i) return;
            document.getElementById('p-bday').innerText = i.birthday;
            document.getElementById('p-aff').innerText = i.affiliation;
            document.getElementById('p-vision').innerText = i.vision;
            document.getElementById('p-const').innerText = i.constellationName;
            document.getElementById('p-cv').innerText = i.cv;
            document.getElementById('p-story').innerText = i.story;
            const cName = document.getElementById('constellation-name');
            if(cName) cName.innerText = i.constellationName;
        }

        function renderStats() {
            const container = document.getElementById('stats-list-container');
            container.innerHTML = "";
            GD.stats.forEach(stat => {
                const row = document.createElement('div');
                row.className = "stat-row";
                row.innerHTML = `<span class="stat-label"><div class="stat-icon"></div>${stat.label}</span><span class="stat-value">${stat.value}</span>`;
                container.appendChild(row);
            });
        }

        function renderWeapon() {
            const w = GD.weapon;
            if(!w) return;
            document.getElementById('weapon-name').innerText = w.name;
            document.getElementById('weapon-subname').innerText = GD.ui.titles.weaponSub || "WEAPON SUB"; 
            document.getElementById('weapon-rarity').innerText = "★".repeat(w.rarity);
            document.getElementById('weapon-type').innerText = w.type;
            document.getElementById('weapon-lvl').innerText = w.levelCurrent;
            document.getElementById('weapon-max').innerText = w.levelMax;
            document.getElementById('weapon-img').src = w.imageSrc;
            document.getElementById('weapon-effect-title').innerText = w.effect.title;
            document.getElementById('weapon-effect-desc').innerText = w.effect.desc;

            const container = document.getElementById('weapon-stats-list');
            container.innerHTML = "";
            w.stats.forEach(stat => {
                const row = document.createElement('div');
                row.className = "stat-row";
                row.innerHTML = `<span class="stat-label"><div class="stat-icon"></div>${stat.label}</span><span class="stat-value">${stat.value}</span>`;
                container.appendChild(row);
            });
        }

        function renderConstellations() {
            const container = document.getElementById('constellation-list-container');
            container.innerHTML = "";
            GD.constellations.forEach((c, index) => {
                const item = document.createElement('div');
                const lockedClass = c.unlocked ? "unlocked" : "locked";
                item.className = `list-item ${lockedClass}`;
                item.onclick = () => openModal('constellation', index);
                item.innerHTML = `<div class="item-icon">${c.id}</div><div class="item-info"><div class="item-name">${c.title}</div><div class="item-sub">${c.sub}</div></div>`;
                container.appendChild(item);
            });
        }

        function renderTalents() {
            const container = document.getElementById('talent-list-container');
            container.innerHTML = "";
            Object.keys(GD.talents).forEach(key => {
                const t = GD.talents[key];
                const item = document.createElement('div');
                item.className = "list-item unlocked";
                item.onclick = () => openModal('talent', key);
                item.innerHTML = `<div class="item-icon">${t.iconChar}</div><div class="item-info"><div class="item-name">${t.title}</div><div class="item-sub">${t.sub.includes("Lv") ? `<span class="talent-lvl"></span>` : t.sub}</div></div>`;
                container.appendChild(item);
            });
        }

        const views = ['status', 'weapon', 'constellation', 'talents', 'profile'];
        function switchTab(tabName) {
            views.forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`tab-${v}`).classList.remove('active');
            });
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function openModal(type, key) {
            let data = null;
            const tabs = document.getElementById('m-tabs');
            switchModalTab('desc');
            if(type === 'constellation') {
                data = GD.constellations[key];
                tabs.classList.add('hidden');
            } else if (type === 'talent') {
                data = GD.talents[key];
                if (data.attributes) {
                    tabs.classList.remove('hidden');
                    currentTalentKey = key;
                    const maxLvl = data.attributes[0].values.length;
                    const slider = document.getElementById('lvl-slider');
                    slider.max = maxLvl;
                    const initialVal = Math.min(10, maxLvl);
                    slider.value = initialVal;
                    onSliderChange(initialVal);
                } else { tabs.classList.add('hidden'); }
            }
            if(data) {
                document.getElementById('m-title').innerText = data.title;
                document.getElementById('m-desc').innerText = data.desc.replace(/<br>/g, '\n').replace(/<b>/g, '').replace(/<\/b>/g, ''); 
                document.getElementById('modal-overlay').classList.add('active');
            }
        }

        function switchModalTab(tabType) {
            const tabDesc = document.getElementById('tab-desc');
            const tabScale = document.getElementById('tab-scale');
            const areaDesc = document.getElementById('area-desc');
            const areaScale = document.getElementById('area-scale');
            if (tabType === 'desc') {
                tabDesc.classList.add('active'); tabScale.classList.remove('active');
                areaDesc.classList.remove('hidden'); areaScale.classList.add('hidden');
            } else {
                tabDesc.classList.remove('active'); tabScale.classList.add('active');
                areaDesc.classList.add('hidden'); areaScale.classList.remove('hidden');
            }
        }

        function onSliderChange(val) {
            document.getElementById('slider-val-text').innerText = val;
            if (currentTalentKey && GD.talents[currentTalentKey].attributes) {
                renderScaleTable(currentTalentKey, val);
            }
        }

        function renderScaleTable(key, lvl) {
            const attributes = GD.talents[key].attributes;
            const table = document.getElementById('scale-table');
            table.innerHTML = "";
            const index = lvl - 1;
            attributes.forEach(attr => {
                const rawVal = (attr.values && attr.values.length > index) ? attr.values[index] : "-";
                const row = document.createElement('tr');
                row.className = "scale-row";
                row.innerHTML = `<td class="scale-cell">${attr.label}</td><td class="scale-cell scale-val">${rawVal}${attr.unit}</td>`;
                table.appendChild(row);
            });
        }

        function closeModal(e) {
            if (e.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }
        function forceCloseModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }
document.addEventListener('mousemove', (e) => {
    const x = (e.clientX - window.innerWidth / 2) / 50;
    const y = (e.clientY - window.innerHeight / 2) / 50;

    const images = document.querySelectorAll('.visual-img');
    images.forEach(img => {
        img.style.transform = `translate(${x}px, ${y}px)`;
    });

    const bgLines = document.querySelector('.constellation-bg-lines');
    if (bgLines) {
        bgLines.style.transform = `translate(${-x * 0.5}px, ${-y * 0.5}px) rotate(${x}deg)`;
    }
});


function animateListItems() {
    const items = document.querySelectorAll('.list-item');
    items.forEach((item, index) => {
        item.style.opacity = '0';
        item.style.transform = 'translateX(10px)';
        setTimeout(() => {
            item.style.transition = 'all 0.4s ease';
            item.style.opacity = '1';
            item.style.transform = 'translateX(0)';
        }, index * 70); 
    });
}


const originalSwitchTab = switchTab;
switchTab = function(tabName) {
    originalSwitchTab(tabName);
    animateListItems(); 
};
    </script>
</body>
</html>
