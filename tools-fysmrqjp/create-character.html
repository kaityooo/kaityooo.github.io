<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>認証中... — 原神 Wiki</title>
  <!--
    ⚠️ セキュリティノート
    このページは auth.js によって保護されています。
    認証が完了するまでコンテンツは描画されません。
    ページタイトルも認証完了後に書き換えられます。
  -->
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/create.css" />
  <style>
    /* ── % トグルボタン ─────────────────── */
    .mult-percent-toggle {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    .mult-percent-toggle input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--gold);
      cursor: pointer;
      flex-shrink: 0;
    }
    .mult-percent-text {
      font-size: .75rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: color .15s;
      line-height: 1;
    }
    .mult-percent-toggle:has(input:checked) .mult-percent-text {
      color: var(--text-gold-light);
    }

    /* ── characters.json マージカード ─── */
    .merge-card {
      background: var(--bg-card);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .merge-card__head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(255,255,255,.025);
      border-bottom: 1px solid var(--border-faint);
    }
    .merge-card__title {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
    }
    .merge-card__body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .merge-desc {
      font-size: .78rem;
      color: var(--text-secondary);
      line-height: 1.75;
    }
    .merge-desc code {
      font-size: .72rem;
      background: var(--bg-surface);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--text-gold);
    }
    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-medium);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--tr);
      font-family: var(--font-base);
    }
    .file-label:hover {
      border-color: var(--border-medium);
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .loaded-file-info {
      display: none;
      font-size: .74rem;
      padding: 8px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      line-height: 1.5;
    }
    #mergeDownloadBtn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
  </style>

  <!--
    認証スクリプトは <head> の最初に読み込む。
    これにより DOMContentLoaded より前に認証チェックが走り、
    コンテンツのフラッシュを防止する。
  -->
  <script src="../js/auth-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // ページコンテンツを即座に非表示にする（認証前のフラッシュ防止）
    document.documentElement.style.visibility = 'hidden';

    // guardPage を呼び出す。
    // コールバック内のコードは認証成功後にのみ実行される。
    guardPage(function() {
      // ✅ 認証済み: ページタイトルとコンテンツを初期化
      document.title = 'キャラクター作成 — 原神 Wiki';
      initCreatePage();
    });
  </script>
</head>
<body>
<!--
  ⚠️ 重要: <body> の中身は意図的に空にしている。
  認証が完了するまで管理用HTMLは一切描画しない。
  全コンテンツは initCreatePage() から動的に生成される。
-->
</body>
</html>

<script>
/**
 * initCreatePage — 認証後に管理UIを動的に構築する
 * guardPage() のコールバックとして呼ばれる。
 */
function initCreatePage() {
  // <body> にサイト構造を注入
  document.body.innerHTML = `
    <div class="site-wrapper">

      <!-- ヘッダー -->
      <header class="site-header">
        <div class="header-inner">
          <a href="../index.html" class="site-logo">
            <span class="logo-main">原神 Wiki</span>
            <span class="logo-sub">ただのお遊び</span>
          </a>
          <nav class="header-nav">
            <a href="../index.html" class="nav-link">戻る</a>
            <span class="nav-link" style="color:#c8a840;cursor:default">管理ツール</span>
            <!-- ログアウトボタンは auth.js が自動注入 -->
          </nav>
        </div>
      </header>

      <!-- メイン -->
      <main class="site-main">

        <!-- タイトルバー -->
        <div class="form-action-bar">
          <div>
            <h1 class="form-action-bar__title">キャラクター JSON 作成ツール</h1>
          </div>
          <div class="form-action-bar__buttons">
            <button type="button" class="btn-secondary" id="clearBtn">🗑 リセット</button>
            <button type="button" class="btn-primary" id="generateBtn">JSON を生成</button>
          </div>
        </div>

        <!-- 2カラムレイアウト -->
        <div class="create-layout">

          <!-- 左: 入力フォーム -->
          <div class="form-column">
            <form id="formMain" onsubmit="return false">

              <!-- 1. 基本情報 -->
              <div class="form-card">
                <div class="form-card__head">
                  <span class="form-card__icon"></span>
                  <span class="form-card__title">基本情報</span>
                
                </div>
                <div class="form-card__body">
                  <div class="field-grid field-grid--2">
                    <div class="field">
                      <label class="field-label" for="charId">キャラクターID <span>*</span></label>
                      <input type="text" id="charId" class="field-input"
                             placeholder="yelan"
                             pattern="[a-z0-9_]+" title="英小文字・数字・アンダースコアのみ">
                      <div class="field-hint">URLに使用。英小文字のみ可</div>
                    </div>
                    <div class="field">
                      <label class="field-label" for="charName">キャラクター名（日本語） <span>*</span></label>
                      <input type="text" id="charName" class="field-input" placeholder="夜蘭">
                    </div>
                  </div>
                  <div class="field-grid field-grid--2">
                    <div class="field">
                      <label class="field-label" for="charNameEn">キャラクター名（英語）</label>
                      <input type="text" id="charNameEn" class="field-input" placeholder="Yelan">
                    </div>
                    <div class="field">
                      <label class="field-label" for="charRegion">出身地域</label>
                      <input type="text" id="charRegion" class="field-input" placeholder="璃月">
                    </div>
                  </div>
                  <div class="field-grid field-grid--3">
                    <div class="field">
                      <label class="field-label" for="elementSelect">元素 <span>*</span></label>
                      <div class="element-selector">
                        <select id="elementSelect" class="field-select">
                          <option value="">選択してください</option>
                          <option value="pyro">炎 </option>
                          <option value="hydro">水 </option>
                          <option value="anemo">風 </option>
                          <option value="electro">雷 </option>
                          <option value="dendro">草 </option>
                          <option value="cryo">氷 </option>
                          <option value="geo">岩 </option>
                        </select>
                        <div class="element-preview" id="elementPreview">
                          <div class="element-preview__icon-empty">?</div>
                          <span class="element-preview__name" style="color:var(--text-muted)">未選択</span>
                        </div>
                      </div>
                    </div>
                    <div class="field">
                      <label class="field-label" for="weaponSelect">武器種 <span>*</span></label>
                      <select id="weaponSelect" class="field-select">
                        <option value="">選択してください</option>
                        <option value="sword">片手剣</option>
                        <option value="claymore">両手剣</option>
                        <option value="polearm">長柄武器</option>
                        <option value="bow">弓</option>
                        <option value="catalyst">法器</option>
                      </select>
                    </div>
                    <div class="field">
                      <label class="field-label">レアリティ <span>*</span></label>
                      <div class="rarity-radio-group">
                        <input type="radio" name="rarity" id="rarity5" value="5" class="rarity-radio" checked>
                        <label for="rarity5" class="rarity-radio-label" data-rarity="5">★★★★★</label>
                        <input type="radio" name="rarity" id="rarity4" value="4" class="rarity-radio">
                        <label for="rarity4" class="rarity-radio-label" data-rarity="4">★★★★</label>
                      </div>
                    </div>
                  </div>
                  <div class="field">
                    <label class="field-label" for="charDesc">キャラクター説明</label>
                    <textarea id="charDesc" class="field-textarea" rows="3"
                      placeholder="キャラクターの背景や性格の説明文..."></textarea>
                  </div>
                </div>
              </div>

              <!-- 2. 基礎ステータス -->
              <div class="form-card">
                <div class="form-card__head">
                  <span class="form-card__icon"></span>
                  <span class="form-card__title">基礎ステータス</span>
                </div>
                <div class="form-card__body">
                  <div class="field-grid field-grid--3">
                    <div class="field">
                      <label class="field-label" for="baseHP">基礎HP</label>
                      <input type="number" id="baseHP" class="field-input" placeholder="" min="0" step="1">
                    </div>
                    <div class="field">
                      <label class="field-label" for="baseATK">基礎攻撃力</label>
                      <input type="number" id="baseATK" class="field-input" placeholder="" min="0" step="1">
                    </div>
                    <div class="field">
                      <label class="field-label" for="baseDEF">基礎防御力</label>
                      <input type="number" id="baseDEF" class="field-input" placeholder="" min="0" step="1">
                    </div>
                  </div>
                  <div class="field-grid field-grid--2">
                    <div class="field">
                      <label class="field-label" for="ascensionStat">突破ステータス</label>
                      <input type="text" id="ascensionStat" class="field-input" placeholder="会心率">
                    </div>
                    <div class="field">
                      <label class="field-label" for="ascensionValue">突破ステータス値</label>
                      <input type="text" id="ascensionValue" class="field-input" placeholder="19.2%">
                    </div>
                  </div>
                  <div class="field-grid field-grid--2">
                    <div class="field">
                      <label class="field-label" for="specialStat">基礎ステータス</label>
                      <input type="text" id="specialStat" class="field-input" placeholder="元素熟知">
                    </div>
                    <div class="field">
                      <label class="field-label" for="specialValue">基礎ステータス値</label>
                      <input type="text" id="specialValue" class="field-input" placeholder="200">
                    </div>
                  </div>
                </div>
              </div>

              <!-- 3. 天賦 -->
              <div class="form-card">
                <div class="form-card__head">
                  <span class="form-card__icon"></span>
                  <span class="form-card__title">天賦</span>
                </div>
                <div class="form-card__body">
                  <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:4px">
                    <!--一応スペース作ったけどいらんかった-->
                  </p>
                  <div class="talent-blocks" id="talentBlocks"></div>
                  <button type="button" class="btn-add" id="addTalentBtn">
                    <span class="btn-add__icon">+</span> 天賦を追加
                  </button>
                </div>
              </div>

              <!-- 4. 固有天賦 -->
              <div class="form-card">
                <div class="form-card__head">
                  <span class="form-card__icon"></span>
                  <span class="form-card__title">固有天賦</span>
                </div>
                <div class="form-card__body">
                  <div class="passive-blocks" id="passiveBlocks"></div>
                  <button type="button" class="btn-add" id="addPassiveBtn">
                    <span class="btn-add__icon">+</span> 固有天賦を追加
                  </button>
                </div>
              </div>

              <!-- 5. 命ノ星座 -->
              <div class="form-card">
                <div class="form-card__head">
                  <span class="form-card__icon"></span>
                  <span class="form-card__title">命ノ星座</span>
                </div>
                <div class="form-card__body">
                  <div class="constellation-blocks" id="constellationBlocks"></div>
                </div>
              </div>

            </form>
          </div>

          <!-- 右: JSONプレビュー -->
          <div class="preview-column">
            <div class="preview-card">
              <div class="preview-card__head">
                <span style="font-size:1rem">{ }</span>
                <span class="preview-card__title">JSON プレビュー</span>
                <span class="preview-card__status" id="previewStatus">未生成</span>
              </div>
              <textarea class="json-output" id="jsonOutput" readonly
                        placeholder="フォームを入力すると自動でJSONが生成されます..."></textarea>
              <div class="preview-actions">
                <button type="button" class="btn-primary" id="copyBtn" style="width:100%;justify-content:center">
                  📋 クリップボードにコピー
                </button>
                <button type="button" class="btn-secondary" id="downloadBtn" style="width:100%;justify-content:center">
                  ⬇️ JSONファイルをダウンロード
                </button>
              </div>
            </div>

            <!-- ── キャラクターJSON 読み込み（編集用） ── -->
            <div class="merge-card">
              <div class="merge-card__head">
                <span class="merge-card__title">既存キャラクターを読み込んで編集</span>
              </div>
              <div class="merge-card__body">
                <p class="merge-desc">
                  既存の <code>{id}.json</code> を読み込み、<br>
                  フォームへ自動入力します。編集後は<br>
                  JSONダウンロードで上書き保存できます。
                </p>

                <!-- ファイル選択 -->
                <label class="file-label" for="charJsonFile">
                  📂 キャラクターJSONを読み込む
                  <input type="file" id="charJsonFile" accept=".json"
                         style="display:none" tabindex="-1">
                </label>

                <!-- 読み込み中キャラクター情報 -->
                <div class="loaded-file-info" id="loadedCharInfo"
                     style="display:none;color:var(--text-gold-light);border-color:var(--border-gold)"></div>
              </div>
            </div>

            <!-- ── data/index.json 管理補助 ── -->
            <div class="merge-card" id="indexHelper" style="display:none">
              <div class="merge-card__head">
                <span class="merge-card__title">data/index.json の更新</span>
              </div>
              <div class="merge-card__body">
                <p class="merge-desc" id="indexAddNote">
                  キャラクターを追加したら index.json を更新してください。
                </p>
                <button type="button"
                        class="btn-primary"
                        id="downloadIndexBtn"
                        style="width:100%;justify-content:center;display:none">
                  ⬇️ 更新した index.json をダウンロード
                </button>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card__head">
                <span class="form-card__title">使い方</span>
              </div>
              <div class="form-card__body" style="gap:10px">
                <div style="font-size:.78rem;color:var(--text-secondary);line-height:1.85">
                  <p><strong style="color:var(--text-gold-light)">① フォームを入力</strong><br>
                  入力するたびにJSONが自動更新されます。</p>
                  <p style="margin-top:10px"><strong style="color:var(--text-gold-light)">② JSONをコピー or ダウンロード</strong><br>
                  生成されたJSONを取得します。</p>
                  <p style="margin-top:10px"><strong style="color:var(--text-gold-light)">③ data/ に配置 + index.json を更新</strong><br>
                  ダウンロードした <code style="font-size:.72rem;background:var(--bg-surface);padding:1px 5px;border-radius:4px">{id}.json</code> を<br>
                  <code style="font-size:.72rem;background:var(--bg-surface);padding:1px 5px;border-radius:4px">data/</code> フォルダに配置し、<br>
                  <code style="font-size:.72rem;background:var(--bg-surface);padding:1px 5px;border-radius:4px">data/index.json</code> にIDを追加します。</p>
                </div>
              </div>
            </div>
          </div>

        </div>
      </main>

      <footer class="site-footer">
        <p>原神 Wiki — 管理ツール（認証済みセッション）</p>
      </footer>
    </div>`;

  // create.js の初期化処理を実行
  // （create.js は <body> 生成後に読み込むため動的に追加）
  const script = document.createElement('script');
  script.src = '../js/create.js';
  script.onload = function() {
    // create.js のDOMContentLoadedイベントは既に発火済みのため
    // 直接初期化関数を呼び出す
    if (typeof initFormPage === 'function') {
      initFormPage();
    }
  };
  document.body.appendChild(script);
}
</script>
